name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # গিটহাবে অনুপস্থিত debug.keystore ফাইলটি .base64 ফাইল থেকে ডিকোড করে তৈরি করা
    - name: Recreate debug.keystore
      run: base64 --decode debug.keystore.base64 > debug.keystore

    # সঠিক Gradle সেটআপ করা
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.12'

    - name: Build Debug APK
      run: gradle assembleDebug

    # সঠিক সাব-মডিউল পাথ (app/) থেকে APK খুঁজে আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BrainTrainerAPK
        path: app/build/outputs/apk/debug/*.apk
