name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # gradlew ফাইল না থাকলেও এই অ্যাকশনটি নিজে থেকে নির্দিষ্ট ভার্সনের Gradle সেটআপ করে দেবে
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.12'

    - name: Build Debug APK
      run: gradle assembleDebug

    # সঠিক পাথ থেকে ওয়াইল্ডকার্ড (*.apk) ব্যবহার করে APK খুঁজে আপলোড করা
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BrainTrainerAPK
        path: build/outputs/apk/debug/*.apk
