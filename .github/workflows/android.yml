name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # গিটহাবে debug.keystore.base64 ফাইলটি থাকলে সেটি ডিকোড করবে, না থাকলে স্কিপ করবে
    - name: Recreate debug.keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 --decode debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 file not found, skipping decoding."
        fi

    # সঠিক Gradle সংস্করণ সেটআপ করা
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.12'

    - name: Build Debug APK
      run: gradle assembleDebug

    # সঠিক আউটপুট পাথ (যেহেতু এই প্রোজেক্টে কোনো আলাদা 'app/' ফোল্ডার নেই)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: BrainTrainerAPK
        path: build/outputs/apk/debug/*.apk
